name: Deploy Test

on:
  push:
    branches: [main]

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Detect stack
        id: stack
        run: |
          if [ -f "package.json" ]; then echo "stack=node" >> $GITHUB_OUTPUT
          elif [ -f "pyproject.toml" ] || [ -f "requirements.txt" ]; then echo "stack=python" >> $GITHUB_OUTPUT
          else echo "stack=unknown" >> $GITHUB_OUTPUT
          fi

      # -- Build --
      - uses: actions/setup-node@v4
        if: steps.stack.outputs.stack == 'node'
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci && npm run build
        if: steps.stack.outputs.stack == 'node'

      - uses: actions/setup-python@v5
        if: steps.stack.outputs.stack == 'python'
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install uv && uv sync
        if: steps.stack.outputs.stack == 'python'

      # -- Backup vor Deployment --
      - name: Backup (Test)
        run: |
          echo "BACKUP_SCRIPT: Hier Backup-Skript eintragen"
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}

      # -- Deploy --
      - name: Deploy to Test
        run: |
          echo "DEPLOY_SCRIPT: Hier Deploy-Skript eintragen"
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      # -- Smoke Tests --
      - name: Smoke Tests
        run: |
          sleep 10
          curl -f ${{ secrets.TEST_APP_URL }}/health || exit 1
          echo "Smoke Test: /health OK"
        env:
          TEST_APP_URL: ${{ secrets.TEST_APP_URL }}

      - name: Deployment Summary
        run: |
          echo "Test-Deployment erfolgreich"
          echo "URL: ${{ secrets.TEST_APP_URL }}"
          echo "Commit: ${{ github.sha }}"
