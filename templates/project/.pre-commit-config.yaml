# Pre-Commit Hooks - läuft lokal vor jedem Commit
# Setup: pre-commit install  (einmalig pro Repo)
# Manuell: pre-commit run --all-files

repos:
  # -- Allgemein --
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # -- Python (nur aktiv wenn .py Dateien vorhanden) --
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: ["--fix"]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # -- Node / TypeScript (nur aktiv wenn .ts/.js Dateien) --
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, json, yaml, markdown]
        exclude: "package-lock.json"

  # -- Secrets (verhindert versehentliches Committen von Keys) --
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
        name: Detect secrets (gitleaks)
